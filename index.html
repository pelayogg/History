<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3f0;
    --ink: #1a1a1a;
    --muted: #888;
    --border: #e0ddd8;
    --thumb-w: 100px;
    --accent: #c8b89a;
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── MAIN LAYOUT ── */
  .gallery {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── THUMBNAILS SIDEBAR ── */
  .sidebar {
    width: var(--thumb-w);
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--ink);
    flex-shrink: 0;
    padding: 2px;
  }

  .thumb {
    flex: 1;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: flex 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.55) saturate(0.7);
    transition: filter 0.4s ease;
  }

  .thumb.active {
    flex: 2;
  }

  .thumb.active img {
    filter: brightness(0.75) saturate(0.9);
  }

  .thumb:hover img {
    filter: brightness(0.75) saturate(1);
  }

  .thumb-label {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    pointer-events: none;
  }

  .thumb-index {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* ── MAIN VIEWER ── */
  .viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--ink);
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1),
                transform 0.7s cubic-bezier(0.4,0,0.2,1);
    transform: scale(1.03);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .slide.exit {
    opacity: 0;
    transform: scale(0.97);
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── SPOTIFY OVERLAY (Bad Bunny only) ── */
  .spotify-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 40px 40px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
    transform: translateY(20px);
    opacity: 0;
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    pointer-events: none;
  }

  .slide.active .spotify-overlay {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .spotify-overlay iframe {
    border-radius: 12px;
    max-width: 500px;
    display: block;
  }

  /* ── COUNTER ── */
  .counter {
    position: absolute;
    top: 32px;
    right: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 10;
  }

  /* ── THIN PROGRESS LINE ── */
  .progress-line {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    z-index: 10;
  }
</style>
</head>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const thumbs  = document.querySelectorAll('.thumb');
  const counter = document.getElementById('counter');

  function select(index) {
    if (index === current) return;

    // Exit current
    slides[current].classList.remove('active');
    slides[current].classList.add('exit');
    thumbs[current].classList.remove('active');
    setTimeout(() => slides[current]?.classList.remove('exit'), 700);

    current = index;

    // Enter new
    slides[current].classList.add('active');
    thumbs[current].classList.add('active');

    // Update counter
    counter.textContent = String(current + 1).padStart(2,'0') + ' / 03';

    // Reload spotify iframe to trigger autoplay when switching to bad bunny
    if (current === 1) {
      const iframe = slides[1].querySelector('iframe');
      const src = iframe.src;
      iframe.src = '';
      setTimeout(() => { iframe.src = src; }, 50);
    }
  }

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') select((current + 1) % 3);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  select((current + 2) % 3);
  });
</script>
